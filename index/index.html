<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .dashboard {
            max-width: 1000px;
            margin: auto;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
            color: #666;
        }

        .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status {
            color: green;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        canvas {
            height: 400px !important;
        }
    </style>
</head>
<body>

<div class="dashboard">

    <h1>📈 Real-Time Crypto Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>BTC Price</h3>
            <div class="value" id="price">Waiting...</div>
        </div>

        <div class="card">
            <h3>Trade Quantity</h3>
            <div class="value" id="quantity">Waiting...</div>
        </div>

        <div class="card">
            <h3>Status</h3>
            <div class="value status" id="status">
                Connecting...
            </div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="btcChart"></canvas>
    </div>

</div>

<script>

    const priceElement = document.getElementById("price");
    const quantityElement = document.getElementById("quantity");
    const statusElement = document.getElementById("status");

    const labels = [];
    const prices = [];

    let latestPrice = null;
    let latestQuantity = null;

    const chart = new Chart(
        document.getElementById("btcChart"),
        {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "BTC/USDT Price",
                    data: prices,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                animation: false,
                scales: {
                    y: {
                        beginAtZero: false
                    }
                }
            }
        }
    );

    const socket = new WebSocket(
        "wss://stream.binance.com:9443/ws/btcusdt@trade"
    );

    socket.onopen = () => {
        statusElement.textContent = "Connected";
        statusElement.style.color = "green";
        console.log("Connected to Binance");
    };

    // Receive ALL trades
    socket.onmessage = (event) => {

        const trade = JSON.parse(event.data);

        latestPrice = parseFloat(trade.p);
        latestQuantity = parseFloat(trade.q);

        // Update cards instantly
        priceElement.textContent =
            "$" + latestPrice.toLocaleString();

        quantityElement.textContent =
            latestQuantity.toFixed(6);
    };

    // Update chart only once every second
    setInterval(() => {

        if (latestPrice === null) {
            return;
        }

        labels.push(
            new Date().toLocaleTimeString()
        );

        prices.push(latestPrice);

        if (prices.length > 30) {
            prices.shift();
            labels.shift();
        }

        chart.update();

    }, 5000);

    socket.onclose = () => {
        statusElement.textContent = "Disconnected";
        statusElement.style.color = "red";
    };

    socket.onerror = (error) => {
        console.error(error);

        statusElement.textContent = "Error";
        statusElement.style.color = "red";
    };

</script>

</body>
</html>
